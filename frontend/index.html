<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 智能问答系统</title>

    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />

    <!-- Highlight.js CSS (代码高亮) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

    <style>
        :root {
            /* 配色方案 */
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252540;
            --bg-card: #1e1e35;
            --bg-hover: #2a2a4a;
            --bg-input: #16162a;

            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --text-muted: #707080;

            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --accent-glow: rgba(99, 102, 241, 0.3);

            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;

            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px var(--accent-glow);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(168, 85, 247, 0.04) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* 头部样式 */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gradient);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1::before {
            content: '🤖';
            font-size: 28px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .status-badge {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        /* 主容器 */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            padding: 24px;
            overflow: hidden;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }

        /* 卡片样式 */
        .el-card {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            box-shadow: var(--shadow-md) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .el-card:hover {
            border-color: rgba(99, 102, 241, 0.2) !important;
            box-shadow: var(--shadow-lg) !important;
        }

        .el-card__header {
            background: var(--bg-tertiary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            padding: 16px 20px !important;
            font-weight: 600;
        }

        .el-card__body {
            color: var(--text-secondary) !important;
            padding: 20px !important;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }

        /* 输入框样式 */
        .el-input__wrapper {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: none !important;
            border-radius: 10px !important;
            transition: all 0.3s ease !important;
        }

        .el-input__wrapper:hover {
            border-color: rgba(99, 102, 241, 0.3) !important;
        }

        .el-input__wrapper.is-focus {
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
        }

        .el-input__inner {
            color: var(--text-primary) !important;
            background: transparent !important;
        }

        .el-input__inner::placeholder {
            color: var(--text-muted) !important;
        }

        .el-textarea__inner {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            border-radius: 12px !important;
            transition: all 0.3s ease !important;
        }

        .el-textarea__inner:hover {
            border-color: rgba(99, 102, 241, 0.3) !important;
        }

        .el-textarea__inner:focus {
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
        }

        /* 按钮样式 */
        .el-button {
            border-radius: 10px !important;
            font-weight: 500 !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            border: 1px solid var(--border-color) !important;
        }

        .el-button--primary {
            background: var(--accent-gradient) !important;
            border: none !important;
            box-shadow: 0 4px 15px var(--accent-glow) !important;
        }

        .el-button--primary:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px var(--accent-glow) !important;
        }

        .el-button--primary:active {
            transform: translateY(0) !important;
        }

        .el-button--default {
            background: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
        }

        .el-button--default:hover {
            background: var(--bg-hover) !important;
        }

        /* 标签样式 */
        .el-tag {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-secondary) !important;
            border-radius: 8px !important;
        }

        .el-tag--info {
            background: rgba(59, 130, 246, 0.15) !important;
            border-color: rgba(59, 130, 246, 0.3) !important;
            color: #60a5fa !important;
        }

        /* 上传区域样式 */
        .el-upload-dragger {
            background: var(--bg-input) !important;
            border: 2px dashed var(--border-color) !important;
            border-radius: 16px !important;
            transition: all 0.3s ease !important;
        }

        .el-upload-dragger:hover {
            border-color: var(--accent-primary) !important;
            background: rgba(99, 102, 241, 0.05) !important;
        }

        .el-icon--upload {
            color: var(--accent-primary) !important;
            font-size: 48px !important;
        }

        .el-upload__text {
            color: var(--text-secondary) !important;
        }

        .el-upload__text em {
            color: var(--accent-primary) !important;
            font-style: normal;
        }

        .el-upload__tip {
            color: var(--text-muted) !important;
            font-size: 12px !important;
        }

        /* 进度条样式 */
        .el-progress-bar__outer {
            background: var(--bg-input) !important;
        }

        .el-progress-bar__inner {
            background: var(--accent-gradient) !important;
        }

        /* 消息提示动画 */
        .el-message {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-lg) !important;
        }

        /* 淡入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .el-card {
            animation: fadeInUp 0.5s ease backwards;
        }

        .left-panel > .el-card:nth-child(1) { animation-delay: 0.1s; }
        .left-panel > .el-card:nth-child(2) { animation-delay: 0.2s; }
        .right-panel > .el-card { animation-delay: 0.3s; }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 320px 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }

            .header {
                padding: 0 20px;
                height: 60px;
            }

            .header h1 {
                font-size: 18px;
            }
        }

        /* 浮动动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Markdown 内容样式 */
        .markdown-body {
            line-height: 1.7;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            color: #fff;
        }

        .markdown-body p {
            margin-bottom: 12px;
        }

        .markdown-body code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .markdown-body li {
            margin-bottom: 4px;
        }

        /* 文档列表项样式 */
        .doc-item {
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .doc-item:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateX(4px);
        }

        .doc-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-name {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .doc-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 聊天消息样式 */
        .message-item {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.3s ease backwards;
        }

        .message-user {
            flex-direction: row-reverse;
        }

        .message-assistant {
            flex-direction: row;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .avatar-user {
            background: var(--accent-gradient);
        }

        .avatar-assistant {
            background: var(--bg-tertiary);
        }

        .message-content {
            max-width: calc(100% - 60px);
            padding: 14px 18px;
            color: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .content-user {
            background: var(--accent-gradient);
            border-radius: 18px 18px 4px 18px;
        }

        .content-assistant {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 18px 18px 18px 4px;
        }

        .user-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .assistant-text {
            color: var(--text-primary);
        }

        .message-sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sources-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .source-item {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        .empty-title {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .empty-desc {
            font-size: 14px;
        }

        .input-area {
            padding: 20px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
        }

        .input-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .input-hint {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint-badge {
            padding: 2px 8px;
            background: var(--bg-input);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* 文档上传组件样式 */
        .upload-field {
            margin-bottom: 20px;
        }

        .field-label {
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .upload-drag-content {
            padding: 40px 20px;
        }

        .el-icon--upload {
            color: var(--accent-primary) !important;
            font-size: 56px !important;
            margin-bottom: 16px;
        }

        .el-upload__text {
            font-size: 15px;
            margin-bottom: 8px;
            color: var(--text-secondary) !important;
        }

        .el-upload__tip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .file-type-tag {
            padding: 4px 10px;
            background: var(--bg-input);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .upload-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .upload-btn {
            flex: 1;
            height: 44px;
            font-size: 15px;
        }

        .btn-text {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-btn {
            height: 44px;
            min-width: 80px;
        }

        .upload-progress-section {
            margin-bottom: 16px;
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .upload-results {
            margin-top: 16px;
        }

        .results-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .result-item {
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
            border-width: 1px;
            border-style: solid;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeInUp 0.3s ease backwards;
        }

        .result-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .result-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .result-icon {
            font-size: 18px;
        }

        .result-info {
            flex: 1;
        }

        .result-filename {
            font-weight: 500;
            color: var(--text-primary);
        }

        .result-status {
            font-size: 12px;
            margin-top: 4px;
        }

        .status-success {
            color: var(--success);
        }

        .status-error {
            color: var(--error);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>🤖 RAG 智能问答系统</h1>
            <span class="status-badge">
                后端: {{ backendStatus }}
            </span>
        </header>

        <!-- 主容器 -->
        <div class="main-container">
            <!-- 左侧面板 - 文档上传 -->
            <div class="left-panel">
                <document-upload @uploaded="refreshDocs" />
                <document-list ref="docListRef" />
            </div>

            <!-- 右侧面板 - 对话 -->
            <div class="right-panel">
                <chat-interface />
            </div>
        </div>
    </div>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Element Plus -->
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>

    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Marked (Markdown 解析) -->
    <script src="https://unpkg.com/marked/marked.min.js"></script>

    <!-- Highlight.js (代码高亮) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- API 封装 -->
    <script src="./js/api/base.js"></script>
    <script src="./js/api/chat.js"></script>

    <!-- 工具函数 -->
    <script src="./js/utils/markdown.js"></script>

    <!-- Vue 组件 -->
    <script src="./js/components/DocumentUpload.js"></script>
    <script src="./js/components/DocumentList.js"></script>
    <script src="./js/components/ChatInterface.js"></script>

    <!-- 主应用 -->
    <script src="./js/app.js"></script>
</body>
</html>
