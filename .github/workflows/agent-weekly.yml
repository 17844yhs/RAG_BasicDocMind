name: Agent 周报

on:
  schedule:
    # 每周一早上 9:40 北京时间 (1:40 UTC)
    - cron: "40 1 * * 1"
  workflow_dispatch:  # 支持手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 生成周报并发送
        env:
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
        run: python scripts/agent_digest.py
